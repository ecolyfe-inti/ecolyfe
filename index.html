<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoLyfe — Sustainability Platform</title>
  <meta name="description" content="Track your eco habits, earn points, and build a greener lifestyle with EcoLyfe." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://ecolyfe-3a51a-default-rtdb.asia-southeast1.firebasedatabase.app">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-logo">
      <span class="loading-logo-mark">🌿</span>
      <span class="loading-logo-text">EcoLyfe</span>
    </div>
    <div class="loading-spinner"></div>
    <p>Loading your dashboard…</p>
  </div>

  <div id="points-toast" class="points-toast"></div>

  <div class="app-shell">
    <header class="hero">
      <div class="hero-brand">
        <span class="hero-logo-mark">🌿</span>
        <span class="hero-logo-name">EcoLyfe</span>
      </div>
      <div class="hero-tagline">
        <h1>Your personal sustainability tracker</h1>
        <p class="hero-copy">Build greener habits, earn points, and benchmark yourself against the INTI community.</p>
      </div>
      <div id="status-bar" class="status-bar"></div>
    </header>

    <main class="layout">
      <section class="panel" id="login-panel"></section>
      <section class="panel" id="survey-panel" hidden></section>
      <section class="panel" id="dashboard-panel" hidden></section>
      <section class="panel" id="leaderboard-panel" hidden></section>
      <section class="panel" id="feed-panel" hidden></section>
      <section class="panel" id="analytics-panel" hidden></section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="firebase-setup.js"></script>
  <script src="app.js"></script>
</body>

</html>
